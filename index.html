<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicio</title>
    <style>
        /* Mantiene la pantalla completamente limpia y en blanco */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <script type="text/javascript">
        // La acción se ejecuta de forma externa al flujo inicial de la página
        setTimeout(function() {
            // Redirección inmediata que reemplaza el historial del navegador
            window.location.replace("https://emprenderjuntos.gob.ve");
        }, 1000); // Espera exactamente 1 segundo (1000 milisegundos)
    </script>

</body>
</html>
